<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DontWatchTho</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 240px;
        font-family: Arial, sans-serif;
        background: #ffffff;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .label {
        font-size: 14px;
        font-weight: 600;
        color: #111111;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 48px;
        height: 28px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        inset: 0;
        cursor: pointer;
        background-color: #d1d5db;
        border-radius: 999px;
        transition: 0.2s;
      }

      .slider::before {
        content: '';
        position: absolute;
        left: 3px;
        top: 3px;
        width: 22px;
        height: 22px;
        background: #ffffff;
        border-radius: 50%;
        transition: 0.2s;
      }

      input:checked + .slider {
        background-color: #ef4444;
      }

      input:checked + .slider::before {
        transform: translateX(20px);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="label">쇼츠 차단</span>
      <label class="switch">
        <input id="hideShortsToggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
