<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DontWatchTho</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        font-family: Arial, sans-serif;
        background: #ffffff;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 12px;
      }

      .label {
        font-size: 13px;
        font-weight: 600;
        color: #111111;
      }

      .input {
        height: 32px;
        padding: 0 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 13px;
      }

      .button {
        width: 100%;
        height: 34px;
        border: none;
        border-radius: 8px;
        background: #ef4444;
        color: #ffffff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <div class="field">
      <label class="label" for="guildIdInput">guildId</label>
      <input id="guildIdInput" class="input" type="text" />
    </div>

    <div class="field">
      <label class="label" for="userIdInput">userId</label>
      <input id="userIdInput" class="input" type="text" />
    </div>

    <button id="refreshButton" class="button" type="button">해제 확인</button>
    <div id="statusText" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
